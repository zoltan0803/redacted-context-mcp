name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -p 'test_*.py'
      - run: python -m py_compile src/redacted_context_mcp/core.py src/redacted_context_mcp/server.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Smoke test built wheel
        shell: python
        run: |
          import glob
          import os
          import subprocess
          import sys

          wheels = glob.glob("dist/*.whl")
          if len(wheels) != 1:
              raise SystemExit(f"Expected one wheel, found {wheels!r}")
          subprocess.check_call([sys.executable, "-m", "venv", "wheel-smoke"])
          python = os.path.join("wheel-smoke", "bin", "python")
          subprocess.check_call([python, "-m", "pip", "install", "--upgrade", "pip"])
          subprocess.check_call([python, "-m", "pip", "install", wheels[0]])
          bin_dir = os.path.join("wheel-smoke", "bin")
          subprocess.check_call([os.path.join(bin_dir, "redctx"), "--help"])
          subprocess.check_call([os.path.join(bin_dir, "redctx-mcp"), "--help"])
